version: '3.8'

services:
  web:
    build: .
    ports:
      - "5001:5001"
    volumes:
      - ./:/app
    environment:
      - SECRET_KEY=sua-chave-secreta-aleatoria-aqui
      - FLASK_APP=wsgi.py
      - FLASK_ENV=development
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: mysql:8.0
    ports:
      - "3312:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=manutencao_db
      - MYSQL_USER=manutencao_user
      - MYSQL_PASSWORD=manutencao_pass
      
    volumes:
      - db_data:/var/lib/mysql
      - ./init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    restart: unless-stopped

volumes:
  db_data:
