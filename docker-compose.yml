version: '3.8'

services:
  web:
    build: .
    ports:
      - "5001:5001"
    volumes:
      - ./:/app
    environment:
      - SECRET_KEY=sua-chave-secreta-aleatoria-aqui
      - FLASK_APP=wsgi.py
      - FLASK_ENV=development
      - TZ=America/Sao_Paulo
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U manutencao_user -d manutencao_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_PASSWORD=manutencao_pass
      - POSTGRES_DB=manutencao_db
      - POSTGRES_USER=manutencao_user
      - TZ=America/Sao_Paulo
      
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    restart: unless-stopped

volumes:
  postgres_data:
